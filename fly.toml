app = "beaver"
primary_region = "iad"

[build]

[env]
  PORT = "4321"
  HOST = "0.0.0.0"

[http_service]
  internal_port = 4321
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "beaver_data"
  destination = "/app/data"
